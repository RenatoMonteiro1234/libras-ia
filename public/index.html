<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Libras IA - Acessibilidade Automática</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0a0e1a;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .logo {
            font-size: 2.5rem;
            font-weight: bold;
            color: #00d4ff;
            margin-bottom: 10px;
        }

        .tagline {
            color: #888;
            margin-bottom: 40px;
            font-size: 1.1rem;
            text-align: center;
        }

        .upload-box {
            border: 2px dashed #00d4ff;
            border-radius: 20px;
            padding: 60px 80px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: #111827;
            width: 100%;
            max-width: 500px;
        }

        .upload-box:hover {
            background: #1a2535;
            transform: scale(1.02);
        }

        .upload-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        .upload-text {
            font-size: 1.3rem;
            margin-bottom: 10px;
        }

        .upload-sub {
            color: #666;
            font-size: 0.9rem;
        }

        input[type="file"] {
            display: none;
        }

        .btn {
            background: #00d4ff;
            color: #000;
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 30px;
            display: none;
            width: 100%;
            max-width: 500px;
        }

        .btn:hover {
            background: #00b8d9;
        }

        .btn:disabled {
            background: #444;
            color: #888;
            cursor: not-allowed;
        }

        .status {
            margin-top: 30px;
            padding: 20px;
            background: #111827;
            border-radius: 10px;
            display: none;
            text-align: center;
            width: 100%;
            max-width: 500px;
        }

        .progresso {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 15px;
        }

        .passo {
            padding: 10px 15px;
            border-radius: 8px;
            background: #1a2535;
            font-size: 0.95rem;
            text-align: left;
        }

        .passo.ativo {
            border-left: 3px solid #00d4ff;
            color: #00d4ff;
        }

        .passo.feito {
            border-left: 3px solid #00ff88;
            color: #00ff88;
        }

        .resultado {
            margin-top: 30px;
            width: 100%;
            max-width: 600px;
            display: none;
        }

        .resultado h3 {
            color: #00ff88;
            margin-bottom: 20px;
            text-align: center;
            font-size: 1.4rem;
        }

        .video-box {
            background: #111827;
            border-radius: 15px;
            padding: 25px;
            border: 2px solid #00ff88;
            text-align: center;
            margin-bottom: 20px;
        }

        .video-box h4 {
            color: #00ff88;
            margin-bottom: 15px;
            font-size: 1.1rem;
        }

        video {
            width: 100%;
            border-radius: 10px;
            margin-bottom: 15px;
            background: #000;
        }

        .btn-download {
            background: #00ff88;
            color: #000;
            border: none;
            padding: 14px 30px;
            border-radius: 20px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            text-decoration: none;
            display: block;
        }

        .btn-download:hover {
            background: #00e077;
        }

        .transcricao {
            background: #111827;
            padding: 15px;
            border-radius: 10px;
            font-size: 0.95rem;
            line-height: 1.6;
            color: #ccc;
        }
    </style>
</head>

<body>
    <div class="logo">🤟 Libras IA</div>
    <div class="tagline">Envie um vídeo e receba o mesmo vídeo com intérprete de Libras</div>

    <label class="upload-box" for="videoInput">
        <div class="upload-icon">📹</div>
        <div class="upload-text" id="uploadText">Clique para enviar seu vídeo</div>
        <div class="upload-sub">MP4, AVI, MOV • Máximo 2GB</div>
        <input type="file" id="videoInput" accept="video/*">
    </label>

    <button class="btn" id="btnProcessar" onclick="processarVideo()">
        🚀 Gerar Vídeo com Libras
    </button>

    <div class="status" id="status">
        <div id="statusTexto">⏳ Processando...</div>
        <div class="progresso">
            <div class="passo" id="passo1">📤 Enviando vídeo</div>
            <div class="passo" id="passo2">🎙️ Transcrevendo áudio com IA</div>
            <div class="passo" id="passo3">🤟 Gerando intérprete de Libras</div>
            <div class="passo" id="passo4">🎬 Montando vídeo final</div>
            <div class="passo" id="passo5">✅ Concluído</div>
        </div>
    </div>

    <div class="resultado" id="resultado">
        <h3>✅ Vídeo com Libras pronto!</h3>

        <div class="video-box">
            <h4>🎬 Seu vídeo com intérprete de Libras</h4>
            <video id="videoFinal" controls></video>
            <a class="btn-download" id="btnDownload" download="video_com_libras.mp4">
                ⬇️ Baixar Vídeo
            </a>
        </div>

        <div class="transcricao" id="transcricao"></div>
    </div>

    <script>
        document.getElementById('videoInput').addEventListener('change', function (e) {
            const file = e.target.files[0];
            if (file) {
                document.getElementById('uploadText').textContent = '✅ ' + file.name;
                document.getElementById('btnProcessar').style.display = 'block';
            }
        });

        function ativarPasso(num) {
            for (let i = 1; i <= 5; i++) {
                const p = document.getElementById('passo' + i);
                if (i < num) p.className = 'passo feito';
                else if (i === num) p.className = 'passo ativo';
                else p.className = 'passo';
            }
        }

        async function processarVideo() {
            const file = document.getElementById('videoInput').files[0];
            const btn = document.getElementById('btnProcessar');
            btn.disabled = true;
            btn.textContent = '⏳ Processando...';

            document.getElementById('status').style.display = 'block';
            document.getElementById('resultado').style.display = 'none';
            ativarPasso(1);

            const formData = new FormData();
            formData.append('video', file);

            try {
                ativarPasso(2);

                const response = await fetch('/processar', {
                    method: 'POST',
                    body: formData
                });

                ativarPasso(3);

                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.erro || 'Erro no servidor');
                }

                ativarPasso(4);

                const blob = await response.blob();
                const videoUrl = URL.createObjectURL(blob);

                ativarPasso(5);

                document.getElementById('videoFinal').src = videoUrl;
                document.getElementById('btnDownload').href = videoUrl;
                document.getElementById('resultado').style.display = 'block';
                document.getElementById('statusTexto').textContent = '✅ Pronto!';

                btn.textContent = '🔄 Processar outro vídeo';
                btn.disabled = false;

            } catch (error) {
                document.getElementById('statusTexto').textContent = '❌ Erro: ' + error.message;
                btn.disabled = false;
                btn.textContent = '🚀 Gerar Vídeo com Libras';
            }
        }
    </script>
</body>

</html>
